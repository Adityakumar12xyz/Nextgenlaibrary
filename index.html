<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextGen Elite | Student Hub</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#050a14">
  <!-- Fonts & Icons -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Space+Grotesk:wght@300;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Dependencies -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    :root {
      --primary: #00f2fe;
      --secondary: #4facfe;
      --accent: #ff007a;
      --bg: #050a14;
      --card-glass: rgba(255, 255, 255, 0.03);
      --card-border: rgba(0, 242, 254, 0.2);
      --neon-glow: 0 0 20px rgba(0, 242, 254, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #neural-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 50%, #0a192f 0%, #050a14 100%);
    }

    .hud-top {
      position: sticky;
      top: 0;
      height: 80px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 30px;
      z-index: 1000;
    }

    .brand-text {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      letter-spacing: 2px;
      font-size: 22px;
      background: linear-gradient(90deg, #fff, var(--primary));
      -webkit-background-clip: text;
      color: transparent;
    }

    /* login screen styling */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 10001;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-box {
      width: 100%;
      max-width: 400px;
      background: var(--card-glass);
      border: 1px solid var(--card-border);
      padding: 40px;
      border-radius: 30px;
      backdrop-filter: blur(40px);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .auth-input {
      width: 100%;
      padding: 15px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      margin-bottom: 15px;
      color: #fff;
      outline: none;
      font-family: inherit;
    }

    .auth-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      color: #000;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      text-transform: uppercase;
    }

    /* main content */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 15px;
    }

    .hero span {
      color: var(--primary);
      text-shadow: var(--neon-glow);
    }

    .elite-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
    }

    .elite-card {
      background: var(--card-glass);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      transition: 0.4s;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .elite-card:hover {
      transform: translateY(-10px);
      border-color: var(--primary);
      box-shadow: var(--neon-glow);
    }
  </style>
</head>

<body>

  <div id="neural-bg"></div>

  <!-- NEXTGEN AUTHENTICATION -->
  <div id="auth-overlay">
    <div class="auth-box" id="login-panel">
      <h2 style="margin-bottom: 30px; font-weight: 900; letter-spacing: 2px; color: var(--primary);">NEXTGEN LOGIN</h2>
      <input type="text" id="l-name" class="auth-input" placeholder="Registered Name">
      <input type="tel" id="l-mobile" class="auth-input" placeholder="Mobile Number">
      <button class="auth-btn" onclick="appLogin()">ACCESS PORTAL</button>
      <p style="margin-top: 20px; font-size: 13px; color: #888;">New Student? <span
          style="color: var(--primary); cursor: pointer; font-weight:900;" onclick="toggleAuth('signup')">Create
          Account</span></p>
    </div>

    <div class="auth-box" id="signup-panel" style="display:none;">
      <h2 style="margin-bottom: 30px; font-weight: 900; color: var(--primary); letter-spacing: 1px;">NEXTGEN
        REGISTRATION</h2>
      <input type="text" id="r-name" class="auth-input" placeholder="Full Name">
      <input type="number" id="r-roll" class="auth-input" placeholder="Roll Number (13 Digits)">
      <input type="tel" id="r-mobile" class="auth-input" placeholder="Mobile Number">
      <button class="auth-btn" style="background: var(--secondary);" onclick="appSignUp()">SIGN UP & ENTER</button>
      <p style="margin-top: 20px; font-size: 13px; color: #888;">Already Registered? <span
          style="color: var(--primary); cursor: pointer; font-weight:900;" onclick="toggleAuth('login')">Login</span>
      </p>
    </div>
  </div>

  <!-- MAIN APP HUD -->
  <header class="hud-top" id="app-hud" style="display:none;">
    <div class="brand-text">NEXTGEN ELITE</div>
    <div style="display:flex; gap:15px; align-items:center;">
      <span id="h-xp" style="color:gold; font-weight:bold; font-size:14px;">0 XP</span>
      <img id="avatar-btn" src="https://ui-avatars.com/api/?name=U&background=00f2fe&color=000"
        style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary);">
    </div>
  </header>

  <main class="container" id="app-content" style="display:none;">
    <div id="home-view">
      <div class="hero">
        <p style="color: var(--primary); font-family: monospace; font-size: 12px;">SYSTEM STATUS: ONLINE</p>
        <h1>WELCOME, <br><span id="user-display-name">...</span></h1>
      </div>

      <div class="elite-grid">
        <div class="elite-card" onclick="alert('Module Loading...')">
          <div style="font-size: 40px; margin-bottom: 15px;">📚</div>
          <div style="font-weight: 900; font-size: 18px;">NextGen Library</div>
          <p style="font-size: 13px; color: #888;">Study Videos & Advanced Notes</p>
        </div>
        <div class="elite-card" onclick="alert('AI Link Ready...')">
          <div style="font-size: 40px; margin-bottom: 15px;">🤖</div>
          <div style="font-weight: 900; font-size: 18px;">Neural Tutor</div>
          <p style="font-size: 13px; color: #888;">AI Powered Learning Help</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    // FIREBASE SETUP
    const firebaseConfig = {
      apiKey: "AIzaSyCeW3RJPGLgP1uKbN5zKQhQDJ6KTkAhPaY",
      authDomain: "nextgen-6c99e.firebaseapp.com",
      projectId: "nextgen-6c99e",
      databaseURL: "https://nextgen-6c99e-default-rtdb.firebaseio.com/",
      appId: "1:774793697681:web:6bcf573562be65701c2230"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentUser = null;

    function toggleAuth(mode) {
      document.getElementById('login-panel').style.display = (mode === 'login') ? 'block' : 'none';
      document.getElementById('signup-panel').style.display = (mode === 'signup') ? 'block' : 'none';
    }

    async function appLogin() {
      const name = document.getElementById('l-name').value.trim();
      const mobile = document.getElementById('l-mobile').value.trim();
      if (!name || !mobile) { alert("Please enter name and mobile!"); return; }

      database.ref('users/' + mobile).once('value', snap => {
        const user = snap.val();
        if (user && user.name.toLowerCase() === name.toLowerCase()) {
          completeAuth(user);
        } else {
          alert("Unauthorized! Redirecting to signup...");
          toggleAuth('signup');
        }
      });
    }

    async function appSignUp() {
      const name = document.getElementById('r-name').value.trim();
      const roll = document.getElementById('r-roll').value.trim();
      const mobile = document.getElementById('r-mobile').value.trim();
      if (!name || !roll || !mobile) { alert("All fields are required!"); return; }

      const userObj = { name, roll, mobile, timeSpent: 0, registeredAt: Date.now() };
      database.ref('users/' + mobile).set(userObj).then(() => {
        completeAuth(userObj);
      });
    }

    function completeAuth(user) {
      currentUser = user;
      localStorage.setItem('lite_user', JSON.stringify(user));
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('app-hud').style.display = 'flex';
      document.getElementById('app-content').style.display = 'block';
      document.getElementById('user-display-name').innerText = user.name.toUpperCase();
      document.getElementById('h-xp').innerText = (user.timeSpent || 0) + " XP";

      // Presence Sync
      database.ref('presence/' + user.mobile).set({
        name: user.name, lastActive: Date.now(), status: 'ONLINE'
      });
    }

    window.onload = () => {
      const saved = localStorage.getItem('lite_user');
      if (saved) completeAuth(JSON.parse(saved));
    }
  </script>
</body>

</html>
